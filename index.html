<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Картины</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            padding: 15px 30px;
            font-size: 20px;
            background: white;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button id="startButton">Начать AR</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video id="video1" src="./video.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline
                muted></video>
            <video id="video2" src="./video1.mp4" loop crossorigin="anonymous" playsinline webkit-playsinline
                muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target1">
            <a-video src="#video1" position="0 0 0" height="1" width="1.5"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" id="target2">
            <a-video src="#video2" position="0 0 0" height="1" width="1.5"></a-video>
        </a-entity>

    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const sceneEl = document.querySelector('a-scene');

        // Находим элементы для первой картины
        const target1 = document.querySelector('#target1');
        const video1 = document.querySelector('#video1');

        // Находим элементы для второй картины
        const target2 = document.querySelector('#target2');
        const video2 = document.querySelector('#video2');

        // Запуск AR по кнопке
        startButton.addEventListener('click', () => {
            sceneEl.systems["mindar-image-system"].start();
            startButton.style.display = 'none';
        });

        // --- ЛОГИКА ДЛЯ ПЕРВОЙ КАРТИНЫ ---
        target1.addEventListener("targetFound", event => {
            video1.play();
        });
        target1.addEventListener("targetLost", event => {
            video1.pause();
        });

        // --- ЛОГИКА ДЛЯ ВТОРОЙ КАРТИНЫ ---
        target2.addEventListener("targetFound", event => {
            video2.play();
        });
        target2.addEventListener("targetLost", event => {
            video2.pause();
        });
    </script>
</body>

</html>
